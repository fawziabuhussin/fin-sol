<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="color-scheme" content="light" />
    <title>Fin$ol</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
      }
      body {
        min-height: 100vh;
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1rem;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: linear-gradient(145deg, #4f46e5 0%, #7c3aed 100%);
        color: #fff;
        padding: env(safe-area-inset-top) 1.5rem env(safe-area-inset-bottom);
      }
      .mark {
        width: 72px;
        height: 72px;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.12);
        display: grid;
        place-items: center;
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.18);
      }
      h1 {
        font-size: 1.75rem;
        font-weight: 800;
        letter-spacing: -0.02em;
      }
      p {
        font-size: 0.95rem;
        opacity: 0.9;
      }
      .spinner {
        width: 28px;
        height: 28px;
        border: 3px solid rgba(255, 255, 255, 0.25);
        border-top-color: #fff;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin-top: 0.5rem;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="mark" aria-hidden="true">
      <svg width="44" height="44" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M19 6 V42" stroke="white" stroke-width="5" stroke-linecap="round" />
        <path d="M19 14 H36" stroke="white" stroke-width="5" stroke-linecap="round" />
        <path d="M19 25 H31" stroke="white" stroke-width="5" stroke-linecap="round" />
      </svg>
    </div>
    <h1>Fin$ol</h1>
    <p>المالية الذكية</p>
    <div class="spinner" aria-label="جاري التحميل"></div>
  </body>
</html>
